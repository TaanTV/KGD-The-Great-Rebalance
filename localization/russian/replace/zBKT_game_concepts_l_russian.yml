l_russian:
 game_concept_friend_desc: "«$game_concept_friend$» — это $game_concept_relation$, свидетельствующие о близкой дружбе и поддержке. Такая связь может возникать как между [Concept( 'children', 'детьми' )|E], так и между [Concept( 'adults', 'взрослыми' )|E]. Каждый $game_concept_friend$ уменьшает получаемый [stress_gain_i][stress|E].\n\n$game_concept_friends$ с глубокой связью могут стать [Concept( 'best_friends', 'лучшими друзьями' )|E]."
 game_concept_best_friend_desc: "$game_concept_best_friend$ — это особые отношения, свидетельствующие о том, что персонажи преданы друг другу до гроба и будут поддерживать друг друга всегда. Это более сильный тип отношений, чем [Concept( 'friend', 'дружба' )|E]. У [Concept('character', 'персонажа')|E] может быть только один лучший друг. $game_concept_best_friends_possessive$ получают меньше и теряют больше [stress_gain_i][Concept( 'stress', 'Стресса' )|E]."
 game_concept_council_desc: "$game_concept_council$ [realms|El] состоит из шести [Concept( 'councillor', 'советников' )|E], которым [ruler|El] поручает управление делами. Каждый советник возглавляет свое ведомство и выполняет важные [councillor_tasks|El].\n\nМнение [Concept( 'vassals', 'вассалов' )|E], чьи [Concept( 'vassal_stances', 'взгляды' )|E] разделены любым из [Concept( 'councillor', 'советников' )|E] их [Concept( 'liege', 'сюзерена' )|E], увеличиваеся"
