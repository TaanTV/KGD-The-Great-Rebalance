l_russian:
 #special_contract_march: "Маркграфский договор"
 special_contract_march_desc: "\n#emphasis #bold Привилегии [Concept( 'vassal', 'вассала' )|E]:#!#!\nМожет [Concept('raiding', 'совершать налеты')|E]\n\n#flavor Под действием маркграфского договора [Concept( 'vassal', 'вассал' )|E] получает бонусы к [Concept( 'levies', 'ополчению' )] и защищенности. [Concept('tax', 'Налоги')|E] при этом будут #high на [EmptyScope.ScriptValue('march_contract_taxes_tooltip')|0]%#! меньше, чем предписано [Concept( 'obligation', 'обязательствами' )|E].#!"
 #special_contract_march_border_trigger: "Владения персонажа [vassal.GetName] не граничат с иностранными [Concept('realm', 'державами')|E]"
 #special_contract_palatinate: "Пфальцграфский договор"
 #special_contract_palatinate_desc: "#flavor Заключив договор «$special_contract_palatinate$», [Concept( 'vassal', 'вассал' )|E] получает множество привилегий, а его политический авторитет быстро растет. Вассалы, заключившие договор «$special_contract_palatinate_short$», повышают [Concept( 'prestige', 'престиж' )|E] [Concept( 'liege', 'сюзерена' )|E], но поступающие от них [Concept( 'tax', 'налоги' )|E] и [Concept( 'levies', 'ополчение' )|E] снижаются на #high [EmptyScope.ScriptValue('palatinate_contract_taxes_tooltip')|0]%#! по сравнению с [Concept( 'obligation', 'обязательствами' )|E].#!"
 #special_contract_castellan: "Кастелянский договор"
 special_contract_castellan_desc: "\n#emphasis #bold Привилегии [Concept( 'vassal', 'вассала' )|E]:#!#!\nМожет [Concept('raiding', 'совершать налеты')|E]\n\n#flavor Под действием договора «$special_contract_castellan$» [Concept('vassal', 'вассал')|E] получает бонусы к [Concept('levies', 'ополчению')|E] и защищенности. Он платит на #high [EmptyScope.ScriptValue('march_contract_taxes_tooltip')|0]%#! меньше [Concept('tax', 'налогов')|E], но предоставляет на #high [EmptyScope.ScriptValue('castellan_contract_levies_tooltip')0]%#! больше [Concept('levy', 'ополченцев')|E], чем предписывают его $feudal_government_taxes$ по [Concept('obligation', 'обязательствам')|E].#!"
 
