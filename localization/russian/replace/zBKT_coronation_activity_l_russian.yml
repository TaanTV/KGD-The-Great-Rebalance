 coronation_small_ceremony_desc: "$EFFECT_LIST_BULLET$Меньше [Concept('coronation_magnificence', 'великолепия')|E]\n$EFFECT_LIST_BULLET$Иноземные [Concept('rulers', 'правители')|E] не посетят ваше [Concept('activity', 'занятие')|E]\n$EFFECT_LIST_BULLET$Если [Concept('coronation_magnificence', 'великолепие')|E] будет ниже #high 50#! на момент завершения, вы получите модификатор «[GetModifier('ach_coronation_low_ceremony_modifier').GetNameWithTooltip]» на #high 25 лет#!\n\n#weak Власть и так у меня в руках, так к чему беспокоить целые народы ради простой формальности?#!"
 ceremony_feast_type_austere_desc: "$EFFECT_LIST_BULLET$ Меньше [Concept('coronation_magnificence', 'великолепия')|E]\n$EFFECT_LIST_BULLET$Если [Concept('coronation_magnificence', 'великолепие')|E] будет ниже #high 50#! на момент завершения, вы получите модификатор «[GetModifier('ach_coronation_low_feast_modifier').GetNameWithTooltip]» на #high 25 лет#!\n\n#weak Разве приглашения на эту историческую церемонию будет недостаточно?#!"