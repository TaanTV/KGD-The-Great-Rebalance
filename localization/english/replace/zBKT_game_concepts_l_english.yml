l_english:
 game_concept_friend_desc:2 "A $game_concept_friend$ is a $game_concept_relation$ indicating close friendship and support, and can be had by both [children|E] and [adults|E]. Every $game_concept_friend$ reduces [stress_gain_i][stress|E] gain.\n\n$game_concept_friends$ with a deep connection might become [best_friends|E]."
 game_concept_best_friend_desc:2 "A $game_concept_best_friend$ is a $game_concept_relation$ indicating lifelong dedication and support. It is a stronger $game_concept_relation$ than a [friend|E]. A [character|E] can only have one $game_concept_best_friend$. Having a $game_concept_best_friend$ reduces [stress_gain_i][stress|E] gain and increases [stress_loss_i][stress|E] loss."
 game_concept_council_desc:0 "The $game_concept_council$ consists of six [councillors|E] who assist their [ruler|E] in the administration of the [realm|E]. As the heads of their respective departments, they can be assigned various important [councillor_tasks|E].\n\n [vassals|E] of [vassal_stances|E] shared by any of your [councillors|E] get a small opinion boost."