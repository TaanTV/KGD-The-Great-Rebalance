l_english:
 action_war_declaration_powerful_vassal_approval_denied: "@powerful_vassal_icon! Powerful Vassal may block War Declarations"
 action_war_declaration_powerful_vassal_approval_denied_combined_group_label: "@warning_icon! Powerful Vassals are blocking War Declarations"
 action_war_declaration_powerful_vassal_approval_denied_combined_group_name: "@powerful_vassal_icon! [powerful_vassals|E] are blocking War Declarations"
 action_war_declaration_powerful_vassal_approval_denied_desc: "[recipient.GetPrimaryTitle.Custom('GetTierIcon')] [recipient.GetUIName] opposes you and will try to block you from declaring wars.\n$action_war_declaration_powerful_vassal_approval_denied_unimportant$ $action_war_declaration_approval_denied_HELP$"
 action_war_declaration_powerful_vassal_approval_denied_combined_group_description: "Two or more of your [powerful_vassals|E] are opposing you and as per your [GetLawGroup('own_war_declaration_law').GetName] you can #Bold not#! declare wars. $action_war_declaration_approval_denied_HELP_plural$"
 action_war_declaration_powerful_vassal_approval_denied_label: "@powerful_vassal_icon! Your Powerful Vassal, [recipient.GetPrimaryTitle.Custom('GetTierIcon')][recipient.GetUINameNoTooltip], could potentially block War Declarations ([recipient.GetOpinionOf( GetPlayer )|+=])"
 action_war_declaration_powerful_vassal_approval_denied_combined_label: "[recipient.GetPrimaryTitle.Custom('GetTierIcon')] [recipient.GetUINameNoTooltip] ([recipient.GetOpinionOf( GetPlayer )|+=])"
 action_war_declaration_powerful_vassal_approval_denied_click: "$action_war_declaration_approval_denied_click$"
 action_war_declaration_powerful_vassal_approval_denied_unimportant: "[recipient.GetHerHim|U] opposing you alone won't hinder your efforts, but if multiple [adult|E] [powerful_vassals|E] are disgruntled you will not be able to declare wars, as dictated by your [GetLawGroup('own_war_declaration_law').GetName]"

 action_war_declaration_council_approval_denied: "@council_icon! Councillor may block War Declarations"
 action_war_declaration_council_approval_denied_combined_group_label: "@warning_icon! Councillors are blocking War Declarations"
 action_war_declaration_council_approval_denied_combined_group_name: "@council_icon! [councillors|E] are blocking War Declarations"
 action_war_declaration_council_approval_denied_desc: "[recipient.GetUIName] opposes you and will try to block you from declaring wars.\n$action_war_declaration_council_approval_denied_unimportant$ $action_war_declaration_approval_denied_HELP$"
 action_war_declaration_council_approval_denied_combined_group_description: "Two or more of your [councillors|E] are opposing you and as per your [GetLawGroup('own_war_declaration_law').GetName] you can #Bold not#! declare wars. $action_war_declaration_approval_denied_HELP_plural$"
 action_war_declaration_council_approval_denied_label: "@council_icon! Your [recipient.GetCouncilTitle], [recipient.GetUINameNoTooltip], could potentially block War Declarations ([recipient.GetOpinionOf( GetPlayer )|+=])"
 action_war_declaration_council_approval_denied_combined_label: "@council_icon! [recipient.GetCouncilTitle] [recipient.GetUINameNoTooltip] ([recipient.GetOpinionOf( GetPlayer )|+=])"
 action_war_declaration_council_approval_denied_click: "$action_war_declaration_approval_denied_click$"
 action_war_declaration_council_approval_denied_unimportant: "[recipient.GetHerHim|U] opposing you alone won't hinder your efforts, but if multiple [councillors|E] (excluding Spouse/Vizier) are disgruntled you will not be able to declare wars, as dictated by your [GetLawGroup('own_war_declaration_law').GetName]."
 
 action_war_declaration_approval_denied_click: "#I Click to open Character View#!"
 action_war_declaration_approval_denied_HELP: "\n\n#help In order to approve, [recipient.GetShortUIName] must either:\n$BULLET_WITH_TAB$Have a positive [opinion|E] of you\n$BULLET_WITH_TAB$Be [cowed|E] by you\n$BULLET_WITH_TAB$Be [imprisoned|E] (by anyone)#!"
 action_war_declaration_approval_denied_HELP_plural: "\n\n#help In order to approve, each one of them must either:\n$BULLET_WITH_TAB$Have a positive [opinion|E] of you\n$BULLET_WITH_TAB$Be [cowed|E] by you\n$BULLET_WITH_TAB$Be [imprisoned|E] (by anyone)#!"