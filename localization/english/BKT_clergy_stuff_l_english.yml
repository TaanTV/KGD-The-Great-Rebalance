 #bkt_clergy.1001.desc: " I request for the lands of [barony_to_construct_at.GetNameNoTier] to be granted to the [liege_scope.GetFaith.AltPriestTermPlural], for the good of the faith and the glory of [liege_scope.GetFaith.HighGodName]!"
