l_english:
 bkt_rule_prefix: "#color_green KRB:#!"
 setting_more_random_conquerors_bonuses: "#high High Random#!"
 setting_more_random_conquerors_bonuses_desc: "[conqueror_i] [ai_conquerors_personality|E] gain the #V [GetTrait('conqueror').GetName( GetNullCharacter )]#! [trait|E] and have a #V 20%#! chance of gaining the [GetModifier('ai_extreme_conqueror_modifier').GetNameWithTooltip] [modifier|E]."
 
 roleplay_difficulty_player: "#high Roleplay#!"
 roleplay_difficulty_ai: "#high Roleplay(AI)#!"
 rolehard_difficulty_player: "#high Rolehard#!"
 rolehard_difficulty_ai: "#high Rolehard(AI)#!"
 rule_bkt_old_difficulty: "$bkt_rule_prefix$ Difficulty"
 setting_bkt_normal_difficulty: "Strict vanilla"
 setting_bkt_normal_difficulty_desc: "No additional bonuses or penalties for player/AI"
 setting_roleplay_difficulty_ai: "#high Roleplay (AI)#!"
 setting_roleplay_difficulty_ai_desc: "Standart set of bonuses/penalties to better balance the game. No [modifiers|E] for the #V Player#!. [modifier|E] for the #V AI#!: [GetModifier('roleplay_difficulty_ai').GetNameWithTooltip]." 
 setting_roleplay_difficulty_player: "#high Roleplay (Player)#!"
 setting_roleplay_difficulty_player_desc: "Standart set of bonuses/penalties to better balance the game. [modifier|E] for the #V Player#!: [GetModifier('roleplay_difficulty_player').GetNameWithTooltip]. No [modifiers|E] for the #V AI#!." 
 setting_roleplay_difficulty: "#high Roleplay#!"
 setting_roleplay_difficulty_desc: "Standart set of bonuses/penalties to better balance the game. [modifier|E] for the #V Player#!: [GetModifier('roleplay_difficulty_player').GetNameWithTooltip]. [modifier|E] for the #V AI#!: [GetModifier('roleplay_difficulty_ai').GetNameWithTooltip]." 
 setting_rolehard_difficulty: "#high Rolehard#!"
 setting_rolehard_difficulty_desc: "A more extreme form of roleplay difficulty. [modifier|E] for the #V Player#!: [GetModifier('rolehard_difficulty_player').GetNameWithTooltip]. [modifier|E] for the #V AI#!: [GetModifier('rolehard_difficulty_ai').GetNameWithTooltip]." 
 setting_rolehard_difficulty_player: "#high Rolehard (Player)#!"
 setting_rolehard_difficulty_player_desc: "Harsher penalties than in roleplay difficulty. [modifier|E] for the #V Player#!: [GetModifier('rolehard_difficulty_player').GetNameWithTooltip]. No [modifiers|E] for the #V AI#!." 
 
 rule_bkt_additional_content: "$bkt_rule_prefix$ Additional content"
 setting_bkt_additional_content_disabled: "#high Disabled#!"
 setting_bkt_additional_content_disabled_desc: "Disables all new systems and events added by the mod. Might cause unintended balance changes."
 setting_bkt_additional_content_enabled: "#high All#!"
 setting_bkt_additional_content_enabled_desc: "Enables all new systems and events added by the mod"
 
 bkt_difficulty_higher_player: "#high Additional Difficulty#!"
 bkt_difficulty_higher_player_desc: "Marriage acceptance malus increases for [matrilineal|E] marriages in male dominated [faith|e] (and vise versa)\n[marriage|E] acceptance: #n -20#!\n[alliance|E] acceptance: #n -20#!\nCall to Arms acceptance: #n -35#!"
 bkt_difficulty_higher_ai: "#high Additional Difficulty (AI)#!"
 bkt_difficulty_higher_ai_desc: "Will #bold never#! hire [skirmishers|E]"
 rule_bkt_difficulty: "$bkt_rule_prefix$ Additional Difficulty"
 setting_bkt_difficulty_disabled: "#high None#!"
 setting_bkt_difficulty_disabled_desc: "Changing this setting will introduce more AI cheats and/or player specific maluses"
 setting_bkt_difficulty_higher: "#high Higher#!"
 setting_bkt_difficulty_higher_desc: "[modifier|E] for the #V Player#!: [GetModifier('bkt_difficulty_higher_player').GetNameWithTooltip]. [modifier|E] for the #V AI#!: [GetModifier('bkt_difficulty_higher_ai').GetNameWithTooltip].\n Please note that im #bold not#! balancing the game around those modifiers"
 BKT_DIFFICULTY_HIGHER_PLAYER_MODIFIER: "$bkt_difficulty_higher_player$: $VALUE|=+0$"
 #inspection_reward_focused_vassal_acceptance_desc: "This character has focused on building bonds with those outside their own realm.\n[offer_vassalization|E] Acceptance: #p +10#!"

 rule_bkt_mp_special_rules: "$bkt_rule_prefix$ Multiplayer Special Treatment"
 setting_bkt_mp_special_rules_disabled: "#high None#!"
 setting_bkt_mp_special_rules_disabled_desc: "Player to player interactions proceed as normal"
 setting_bkt_mp_special_rules_enabled: "#high Relaxed#!"
 setting_bkt_mp_special_rules_enabled_desc: "[GetModifier('dummy_mp_rules_description_modifier').GetNameWithTooltip]"
 dummy_mp_rules_description_modifier: "Multiplayer Player to Player Special Ruleset"
 dummy_mp_rules_description_modifier_desc: "#bold Unlocks#! Joining wars of other players without Alliances\n#bold Unlocks#! unlimited changes to other players Vassal Contracts" 
 
 rule_bkt_accolades: "$bkt_rule_prefix$ [accolades|E]"
 setting_bkt_accolades_enabled: "#high Enabled#!"
 setting_bkt_accolades_enabled_desc: "[accolades|E] are enabled for #V Everyone#"
 setting_bkt_accolades_disabled_player: "#high AI only#!"
 setting_bkt_accolades_disabled_player_desc: "[accolades|E] are disabled for the #V Player#"
 setting_bkt_accolades_disabled_all: "#high Disabled#!"
 setting_bkt_accolades_disabled_all_desc: "[accolades|E] are disabled for #V Everyone#"
 bkt_accolades_disabled: "No accolades?"